  <script type="module">
    const A='home-shopping-desk',SID=crypto.randomUUID(),had=new URLSearchParams(location.search).has('room');
    const S=[['compare','待比较','#e8f4ff','#195478'],['chosen','已选定','#dff8ee','#18614b'],['ordered','已下单','#fff4ca','#77570b'],['arrived','已到手','#e7f7df','#38651b'],['aftercare','售后中','#ffe8f0','#753346'],['paused','暂缓','#ece8ff','#4b3b82']];
    const demo=[['全身镜','','',''],['床','','淘宝',''],['床头柜','','淘宝',''],['智能门锁','德施曼M8','山姆','1200'],['吹风机','莱芬swift4','',''],['智能马桶','恒洁H5 ultra','',''],['电风扇','美的幸运草2Max','京东','455'],['飘窗垫','','',''],['饮水机','小熊钢钢好','',''],['客厅茶几','','',''],['吸尘器','小狗S008','拼多多','428']];
    const $=s=>document.querySelector(s), E={user:$('#user'),room:$('#room'),mode:$('#mode'),updated:$('#updated'),people:$('#people'),months:$('#months'),stats:$('#stats'),filters:$('#filters'),q:$('#q'),form:$('#form'),body:$('#body'),mobile:$('#mobile'),toast:$('#toast'),file:$('#file')};
    const month=()=>new Date().toISOString().slice(0,7), rid=()=>Math.random().toString(36).slice(2,6)+'-'+Math.random().toString(36).slice(2,6);
    const app={room:new URLSearchParams(location.search).get('room')||localStorage.getItem(A+':room')||rid(),name:JSON.parse(localStorage.getItem(A+':user')||'{}').name||'伙伴'+Math.floor(10+Math.random()*89),color:localStorage.getItem(A+':color')||['#73d8b7','#ff8d7f','#f5d060','#8cc8ff','#f5abc4'][Math.floor(Math.random()*5)],view:localStorage.getItem(A+':month')||month(),filter:'all',q:'',peers:new Map(),mode:'本地协作模式',map:null,adapter:null};localStorage.setItem(A+':color',app.color);
    if(!had){let u=new URL(location);u.searchParams.set('room',app.room);history.replaceState({},'',u)}localStorage.setItem(A+':room',app.room);E.user.value=app.name;E.room.textContent='房间 '+app.room;
    const clean=v=>String(v||'').replace(/[^\d.]/g,''), money=n=>'¥'+(n?new Intl.NumberFormat('zh-CN').format(n):'0'), esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])), st=id=>S.find(x=>x[0]===id)||S[0], norm=o=>({id:o.id||crypto.randomUUID(),item:o.item||'',brand:o.brand||'',channel:o.channel||'',price:clean(o.price),status:S.some(x=>x[0]===o.status)?o.status:'compare',owner:o.owner||'',month:o.month||month(),note:o.note||'',link:o.link||'',createdAt:+o.createdAt||Date.now(),updatedAt:+o.updatedAt||Date.now(),updatedBy:o.updatedBy||''});
    function localAdapter(){let key=A+':items:'+app.room,bc='BroadcastChannel'in window?new BroadcastChannel(key):null,m=new Map(JSON.parse(localStorage.getItem(key)||'[]').map(x=>[x.id,norm(x)]));let save=()=>localStorage.setItem(key,JSON.stringify([...m.values()]));bc&&bc.addEventListener('message',e=>{let d=e.data;if(!d||d.sid===SID)return;if(d.type==='up'){m.set(d.item.id,norm(d.item));save();render()}if(d.type==='del'){m.delete(d.id);save();render()}if(d.type==='peer'){app.peers.set(d.user.sid,{...d.user,seen:Date.now()});render()}if(d.type==='edit'){let p=app.peers.get(d.sid);if(p){p.edit=d.edit;p.seen=Date.now();render()}}});return{all:()=>[...m.values()].sort((a,b)=>a.createdAt-b.createdAt),one:id=>m.get(id),up:x=>{x=norm(x);m.set(x.id,x);save();bc&&bc.postMessage({sid:SID,type:'up',item:x})},del:id=>{m.delete(id);save();bc&&bc.postMessage({sid:SID,type:'del',id})},peer:u=>bc&&bc.postMessage({sid:SID,type:'peer',user:u}),edit:e=>bc&&bc.postMessage({sid:SID,type:'edit',edit:e})}}
    async function init(){try{const yv='13.6.31';const[{Doc},{WebrtcProvider},{IndexeddbPersistence}]=await Promise.all([import('https://esm.sh/yjs@'+yv),import('https://esm.sh/y-webrtc@10.3.0?deps=yjs@'+yv),import('https://esm.sh/y-indexeddb@9.0.12?deps=yjs@'+yv)]);let doc=new Doc(),map=doc.getMap('items'),p=new WebrtcProvider(A+':'+app.room,doc,{signaling:['wss://signaling.yjs.dev']});new IndexeddbPersistence(A+':'+app.room,doc);app.map=map;app.mode='WebRTC 实时协作';p.awareness.setLocalStateField('user',pub());p.awareness.on('change',()=>{for(let [id,s] of p.awareness.getStates())if(s.user&&s.user.sid!==SID)app.peers.set(s.user.sid,{...s.user,seen:Date.now()});render()});map.observe(render);app.adapter={all:()=>[...map.values()].sort((a,b)=>a.createdAt-b.createdAt),one:id=>map.get(id),up:x=>map.set(x.id,norm(x)),del:id=>map.delete(id),peer:()=>{},edit:e=>p.awareness.setLocalStateField('user',{...pub(),edit:e})}}catch{app.adapter=localAdapter()}if(!had&&!app.adapter.all().length)demo.forEach((r,i)=>app.adapter.up(norm({id:'starter-'+i,item:r[0],brand:r[1],channel:r[2],price:r[3],status:i>2&&i<7?'chosen':'compare',owner:i%3?'':app.name,month:month(),createdAt:Date.now()+i})));setInterval(()=>{app.adapter.peer(pub());for(let[k,p]of app.peers)if(Date.now()-p.seen>8000)app.peers.delete(k);render()},2200);render()}
    const pub=()=>({sid:SID,name:app.name,color:app.color});
    function render(){let items=app.adapter?app.adapter.all():[], monthItems=items.filter(x=>x.month===app.view), visible=monthItems.filter(x=>(app.filter==='all'||x.status===app.filter)&&(!app.q||[x.item,x.brand,x.channel,x.owner,x.note].join(' ').toLowerCase().includes(app.q)));E.mode.textContent=app.mode;E.updated.textContent='更新于 '+new Date().toLocaleTimeString('zh-CN');E.people.innerHTML=[pub(),...[...app.peers.values()]].map(p=>`<span class="chip"><span class="ava" style="background:${p.color}">${esc((p.name||'我')[0])}</span>${esc(p.name)}${p.sid===SID?' · 我':''}</span>`).join('');let ms=[...new Set([month(),app.view,...items.map(x=>x.month)])].sort().reverse();E.months.innerHTML=ms.map(m=>{let xs=items.filter(x=>x.month===m),sum=xs.reduce((a,b)=>a+Number(b.price||0),0);return `<button class="month ${m===app.view?'active':''}" data-month="${m}"><span><b>${m.replace('-','年')}月</b><small>${xs.length} 项</small></span><b>${money(sum)}</b></button>`}).join('');let sum=monthItems.reduce((a,b)=>a+Number(b.price||0),0),arr=monthItems.filter(x=>x.status==='arrived').length,chs=new Set(monthItems.map(x=>x.channel).filter(Boolean));E.stats.innerHTML=[['本月项目',monthItems.length,visible.length+' 项在当前视图'],['预算合计',money(sum),'按到手价汇总'],['已到手',arr,(monthItems.length-arr)+' 项待推进'],['购买渠道',chs.size,[...chs].slice(0,3).join(' / ')||'待补充']].map(x=>`<div class="stat"><span>${x[0]}</span><b>${x[1]}</b><span>${x[2]}</span></div>`).join('');E.filters.innerHTML=[['all','全部'],...S.map(x=>[x[0],x[1]])].map(x=>`<button class="seg ${app.filter===x[0]?'active':''}" data-filter="${x[0]}">${x[1]} · ${x[0]==='all'?monthItems.length:monthItems.filter(i=>i.status===x[0]).length}</button>`).join('');E.body.innerHTML=visible.map(row).join('');E.mobile.innerHTML=visible.map(card).join('')||'<div class="card"><b>这个月份还没有清单项</b></div>'}
    function row(x){let s=st(x.status);return `<tr data-id="${x.id}">${['item','brand','channel','price'].map(f=>cell(x,f)).join('')}<td><select class="cell" data-id="${x.id}" data-f="status" style="background:${s[2]};color:${s[3]}">${S.map(a=>`<option value="${a[0]}" ${a[0]===x.status?'selected':''}>${a[1]}</option>`).join('')}</select></td>${cell(x,'owner')}<td><div class="note">${cell(x,'note',1)}${cell(x,'link',1)}</div></td><td><button class="rowbtn" data-del="${x.id}">×</button></td></tr>`}
    function cell(x,f,bare){return `${bare?'':'<td>'}<input class="cell" data-id="${x.id}" data-f="${f}" value="${esc(x[f])}" placeholder="${f==='price'?'¥':''}">${bare?'':'</td>'}`}
    function card(x){let s=st(x.status);return `<article class="card"><div class="cardhead"><div><b>${esc(x.item||'未命名项目')}</b><br><small>${esc(x.brand||'待补型号')}</small></div><span class="tag" style="background:${s[2]};color:${s[3]}">${s[1]}</span></div><div class="mini">${['item','brand','channel','price','owner','note','link'].map(f=>`<label class="field ${['note','link'].includes(f)?'full':''}"><span>${({item:'项目',brand:'品牌型号',channel:'购买渠道',price:'到手价',owner:'负责人',note:'备注',link:'链接'})[f]}</span><input data-id="${x.id}" data-f="${f}" value="${esc(x[f])}"></label>`).join('')}<label class="field"><span>状态</span><select data-id="${x.id}" data-f="status">${S.map(a=>`<option value="${a[0]}" ${a[0]===x.status?'selected':''}>${a[1]}</option>`).join('')}</select></label></div><button class="btn" data-del="${x.id}">删除</button></article>`}
    document.addEventListener('click',e=>{let m=e.target.closest('[data-month]'),f=e.target.closest('[data-filter]'),d=e.target.closest('[data-del]');if(m){app.view=m.dataset.month;localStorage.setItem(A+':month',app.view);render()}if(f){app.filter=f.dataset.filter;render()}if(d){app.adapter.del(d.dataset.del);toast('已删除')}});
    document.addEventListener('input',e=>{let t=e.target;if(t.id==='q'){app.q=t.value.trim().toLowerCase();render();return}if(t.id==='user'){app.name=t.value.trim()||'我';localStorage.setItem(A+':user',JSON.stringify({name:app.name}));render();return}if(!t.dataset.f)return;let old=app.adapter.one(t.dataset.id);if(!old)return;app.adapter.edit({id:t.dataset.id,f:t.dataset.f});clearTimeout(t._timer);t._timer=setTimeout(()=>{app.adapter.up({...old,[t.dataset.f]:t.dataset.f==='price'?clean(t.value):t.value.trim(),updatedAt:Date.now(),updatedBy:app.name});toast('已同步')},180)});
    document.addEventListener('focusout',e=>{if(e.target.dataset.f)app.adapter.edit(null)});
    E.form.onsubmit=e=>{e.preventDefault();let fd=new FormData(E.form),x=norm(Object.fromEntries(fd));x.owner=app.name;x.month=app.view;app.adapter.up(x);E.form.reset();toast('已新增')};
    $('#copy').onclick=async()=>{await navigator.clipboard.writeText(location.href).catch(()=>{});toast('协作链接已复制')};$('#newRoom').onclick=()=>{let u=new URL(location);u.searchParams.set('room',rid());location.href=u};$('#exportBtn').onclick=()=>{let b=new Blob([JSON.stringify(app.adapter.all(),null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='shopping-list-'+app.room+'.json';a.click()};$('#importBtn').onclick=()=>E.file.click();E.file.onchange=async()=>{let arr=JSON.parse(await E.file.files[0].text());arr.forEach(x=>app.adapter.up(norm(x)));toast('已导入 '+arr.length+' 项')};function toast(s){E.toast.textContent=s;E.toast.classList.add('show');setTimeout(()=>E.toast.classList.remove('show'),1800)}init();
  </script>
</body>
</html>
